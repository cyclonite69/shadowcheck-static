AWSTemplateFormatVersion: '2010-09-09'
Description: 'ShadowCheck - IAM Permissions for EC2 Instance (S3 Backups + EC2 Management)'

Parameters:
  RoleName:
    Type: String
    Default: EC2-SSM-Role
    Description: Existing IAM role attached to EC2 instance

  BackupBucketName:
    Type: String
    Default: dbcoopers-briefcase-161020170158
    Description: S3 bucket for database backups

Resources:
  S3BackupPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ShadowCheck-S3-Backup-Access
      Roles:
        - !Ref RoleName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3BackupAccess
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:PutObjectAcl
              - s3:GetObject
              - s3:ListBucket
              - s3:DeleteObject
            Resource:
              - !Sub 'arn:aws:s3:::${BackupBucketName}/*'
              - !Sub 'arn:aws:s3:::${BackupBucketName}'

  EC2ManagementPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ShadowCheck-EC2-Management
      Roles:
        - !Ref RoleName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EC2InstanceManagement
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:StartInstances
              - ec2:StopInstances
              - ec2:RebootInstances
            Resource: '*'

Outputs:
  S3PolicyArn:
    Description: ARN of the S3 backup policy
    Value: !Ref S3BackupPolicy

  EC2PolicyArn:
    Description: ARN of the EC2 management policy
    Value: !Ref EC2ManagementPolicy

  RoleName:
    Description: IAM role with backup and EC2 management permissions
    Value: !Ref RoleName
